<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PlayBindas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h1 {
            color: #667eea;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }

        .balance-card .amount {
            font-size: 24px;
            font-weight: bold;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .profile-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        .edit-profile {
            margin-left: auto;
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .finance-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .finance-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
        }

        .finance-card h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .games-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .game-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
        }

        .game-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .qr-section {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .qr-code {
            width: 200px;
            height: 200px;
            margin: 10px auto;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 1000;
            display: none;
        }

        .message.success {
            background: #28a745;
            color: white;
            display: block;
        }

        .message.error {
            background: #dc3545;
            color: white;
            display: block;
        }

        .message.info {
            background: #17a2b8;
            color: white;
            display: block;
        }

        @media (max-width: 768px) {
            .finance-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="logo">
                <h1>🎮 PlayBindas Gaming</h1>
            </div>
            <div class="user-info">
                <div class="balance-card">
                    <div style="font-size: 12px;">Your Balance</div>
                    <div class="amount" id="userBalance">₹0</div>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="profile-section">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <div class="profile-details">
                    <h3 id="userName">Loading...</h3>
                    <p id="userEmail">Loading...</p>
                </div>
                <button class="edit-profile" onclick="editProfile()">Edit Profile</button>
            </div>
        </div>

        <div class="finance-section">
            <div class="finance-card">
                <h3>💰 Deposit Money (Min ₹500)</h3>
                <div class="input-group">
                    <input type="number" id="depositAmount" placeholder="Enter amount">
                </div>
                <div id="qrSection" style="display: none;">
                    <div class="qr-section">
                        <p>Scan QR Code to Pay</p>
                        <img id="qrCode" class="qr-code" src="">
                        <p style="font-size: 12px; margin-top: 10px;">UPI: playbindas@okhdfcbank</p>
                        <div class="input-group">
                            <input type="text" id="utrNumber" placeholder="Enter UTR Number">
                        </div>
                        <button class="btn-primary" onclick="submitDeposit()">✅ I Have Paid</button>
                    </div>
                </div>
                <button class="btn-primary" onclick="showQR()">Proceed to Deposit</button>
            </div>

            <div class="finance-card">
                <h3>💸 Withdraw Money</h3>
                <div class="input-group">
                    <label>Withdrawal Amount (Min ₹500)</label>
                    <input type="number" id="withdrawAmount" placeholder="Enter amount">
                </div>
                <div class="input-group">
                    <label>Account Holder Name</label>
                    <input type="text" id="accountHolderName" placeholder="Enter account holder name">
                </div>
                <div class="input-group">
                    <label>Bank Name</label>
                    <input type="text" id="bankName" placeholder="Enter bank name">
                </div>
                <div class="input-group">
                    <label>Account Number</label>
                    <input type="text" id="accountNumber" placeholder="Enter account number">
                </div>
                <div class="input-group">
                    <label>IFSC Code</label>
                    <input type="text" id="ifscCode" placeholder="Enter IFSC code">
                </div>
                <button class="btn-primary" onclick="requestWithdrawal()">Request Withdrawal</button>
            </div>
        </div>

        <div class="games-section">
            <h2>🎲 Available Games</h2>
            <div class="games-grid" id="gamesGrid">
                <div class="game-card" data-game="Chakri Game">
                    <div class="game-icon">🎯</div>
                    <h3>Chakri Game</h3>
                    <p>Bet on animals | Payout 1:5</p>
                </div>
            </div>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDfWOOwjX6nK-kuWnitTbb7_3x2LvmPgA",
            authDomain: "playbindas.firebaseapp.com",
            projectId: "playbindas",
            storageBucket: "playbindas.firebasestorage.app",
            messagingSenderId: "1084591578297",
            appId: "1:1084591578297:web:fcdab9361e7a2373250f68",
            measurementId: "G-RK5636CWLW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        function showMessage(text, type = 'success') {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        async function loadGames() {
            const gamesSnapshot = await getDocs(collection(db, "games"));
            const gamesGrid = document.getElementById('gamesGrid');
            
            if (!gamesSnapshot.empty) {
                gamesGrid.innerHTML = '';
                gamesSnapshot.forEach(doc => {
                    const game = doc.data();
                    gamesGrid.innerHTML += `
                        <div class="game-card" data-game="${game.name}">
                            <div class="game-icon">${game.icon || '🎲'}</div>
                            <h3>${game.name}</h3>
                            <p>${game.description || 'Coming Soon'}</p>
                        </div>
                    `;
                });
            }
            
            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', () => {
                    const gameName = card.getAttribute('data-game');
                    if (gameName === 'Chakri Game') {
                        window.location.href = 'game.html';
                    } else {
                        showMessage('Game coming soon!', 'info');
                    }
                });
            });
        }

        window.showQR = function() {
            const amount = document.getElementById('depositAmount').value;
            if (amount < 500) {
                showMessage('Minimum deposit is ₹500!', 'error');
                return;
            }
            const upiUrl = `upi://pay?pa=playbindas@okhdfcbank&am=${amount}&cu=INR`;
            const qrUrl = `https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=${encodeURIComponent(upiUrl)}`;
            document.getElementById('qrCode').src = qrUrl;
            document.getElementById('qrSection').style.display = 'block';
        };

        window.submitDeposit = async function() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const utr = document.getElementById('utrNumber').value;
            if (!utr) {
                showMessage('Enter UTR number!', 'error');
                return;
            }
            await addDoc(collection(db, "depositRequests"), {
                userId: currentUser.uid,
                userName: currentUser.displayName,
                userEmail: currentUser.email,
                amount: amount,
                utrNumber: utr,
                status: 'pending',
                requestedAt: new Date().toISOString()
            });
            showMessage('Deposit request submitted! Admin will verify.', 'success');
            document.getElementById('qrSection').style.display = 'none';
            document.getElementById('depositAmount').value = '';
            document.getElementById('utrNumber').value = '';
        };

        window.requestWithdrawal = async function() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const accountHolderName = document.getElementById('accountHolderName').value;
            const bankName = document.getElementById('bankName').value;
            const accountNumber = document.getElementById('accountNumber').value;
            const ifscCode = document.getElementById('ifscCode').value;
            
            if (amount < 500) {
                showMessage('Minimum withdrawal ₹500!', 'error');
                return;
            }
            if (!accountHolderName || !bankName || !accountNumber || !ifscCode) {
                showMessage('Please fill all bank details!', 'error');
                return;
            }
            
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.data().balance < amount) {
                showMessage('Insufficient balance!', 'error');
                return;
            }
            
            await addDoc(collection(db, "withdrawRequests"), {
                userId: currentUser.uid,
                userName: currentUser.displayName,
                userEmail: currentUser.email,
                amount: amount,
                accountHolderName: accountHolderName,
                bankName: bankName,
                accountNumber: accountNumber,
                ifscCode: ifscCode,
                status: 'pending',
                requestedAt: new Date().toISOString()
            });
            
            showMessage('Withdrawal request submitted! Admin will verify.', 'success');
            
            document.getElementById('withdrawAmount').value = '';
            document.getElementById('accountHolderName').value = '';
            document.getElementById('bankName').value = '';
            document.getElementById('accountNumber').value = '';
            document.getElementById('ifscCode').value = '';
        };

        window.editProfile = async function() {
            const newName = prompt('Enter new name:', currentUser.displayName);
            if (newName) {
                await updateProfile(currentUser, { displayName: newName });
                const userRef = doc(db, "users", currentUser.uid);
                await updateDoc(userRef, { name: newName });
                document.getElementById('userName').textContent = newName;
                showMessage('Profile updated!');
            }
        };

        window.logout = async function() {
            await signOut(auth);
            window.location.href = 'index.html';
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userEmail').textContent = user.email;
                
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (doc) => {
                    if (doc.exists()) {
                        document.getElementById('userBalance').textContent = `₹${doc.data().balance}`;
                    }
                });
                
                await loadGames();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
