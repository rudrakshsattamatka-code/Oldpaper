<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayBindas - Login & Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
            border: none;
            background: none;
            font-size: 16px;
        }

        .tab.active {
            color: #667eea;
            background: white;
            border-bottom: 2px solid #667eea;
        }

        .form-container {
            padding: 40px;
        }

        .form {
            display: none;
            animation: slideIn 0.3s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        h2 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            display: block;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            display: block;
        }

        .message.info {
            background: #e3f2fd;
            color: #1976d2;
            display: block;
        }

        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* Loading state */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .loading button {
            position: relative;
        }

        .loading button::after {
            content: "...";
            position: absolute;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div class="form-container">
            <!-- Login Form -->
            <div id="loginForm" class="form active">
                <h2>Welcome Back!</h2>
                <form id="login">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit">Login</button>
                </form>
                <div class="forgot-password">
                    <a href="#" onclick="resetPassword()">Forgot Password?</a>
                </div>
            </div>

            <!-- Sign Up Form -->
            <div id="signupForm" class="form">
                <h2>Create Account</h2>
                <form id="signup">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="signupName" required placeholder="Enter your full name">
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="signupEmail" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" required placeholder="Create a password (min 6 characters)">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signupConfirmPassword" required placeholder="Confirm your password">
                    </div>
                    <button type="submit">Sign Up</button>
                </form>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBDfWOOwjX6nK-kuWnitTbb7_3x2LvmPgA",
            authDomain: "playbindas.firebaseapp.com",
            projectId: "playbindas",
            storageBucket: "playbindas.firebasestorage.app",
            messagingSenderId: "1084591578297",
            appId: "1:1084591578297:web:fcdab9361e7a2373250f68",
            measurementId: "G-RK5636CWLW"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Make auth available globally for other functions
        window.auth = auth;

        // Get DOM elements
        const messageDiv = document.getElementById('message');
        
        // Function to show messages
        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
                messageDiv.className = 'message';
            }, 5000);
        }

        // Login handler
        document.getElementById('login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Show loading state
            const form = e.target;
            form.classList.add('loading');
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                showMessage(`Welcome back! Redirecting...`, 'success');
                
                // Store user info
                localStorage.setItem('user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName
                }));
                
                // Redirect to main page after 1.5 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html'; // You can change this to your video page
                }, 1500);
                
            } catch (error) {
                let errorMessage = 'Login failed. ';
                switch(error.code) {
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email format.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage += 'This account has been disabled.';
                        break;
                    case 'auth/user-not-found':
                        errorMessage += 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage += 'Incorrect password.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                showMessage(errorMessage);
            } finally {
                form.classList.remove('loading');
            }
        });
        
        // Signup handler
        document.getElementById('signup').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                showMessage('Passwords do not match!');
                return;
            }
            
            // Validate password length
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long!');
                return;
            }
            
            // Show loading state
            const form = e.target;
            form.classList.add('loading');
            
            try {
                // Create user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Update profile with name
                await updateProfile(user, {
                    displayName: name
                });
                
                showMessage(`Account created successfully! Welcome ${name}! Redirecting...`, 'success');
                
                // Store user info
                localStorage.setItem('user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: name
                }));
                
                // Redirect after 1.5 seconds
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (error) {
                let errorMessage = 'Signup failed. ';
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage += 'Email already registered. Please login instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage += 'Invalid email format.';
                        break;
                    case 'auth/weak-password':
                        errorMessage += 'Password is too weak. Use at least 6 characters.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                showMessage(errorMessage);
            } finally {
                form.classList.remove('loading');
            }
        });
        
        // Make functions available globally
        window.switchTab = function(tab) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update forms
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                signupForm.classList.add('active');
            }
            
            // Clear messages
            messageDiv.style.display = 'none';
            messageDiv.className = 'message';
        };
        
        window.resetPassword = async function() {
            const email = prompt('Enter your email address to reset password:');
            if (email && email.includes('@')) {
                try {
                    await sendPasswordResetEmail(auth, email);
                    showMessage('Password reset email sent! Check your inbox.', 'success');
                } catch (error) {
                    let errorMessage = 'Password reset failed. ';
                    switch(error.code) {
                        case 'auth/user-not-found':
                            errorMessage += 'No account found with this email.';
                            break;
                        case 'auth/invalid-email':
                            errorMessage += 'Invalid email format.';
                            break;
                        default:
                            errorMessage += error.message;
                    }
                    showMessage(errorMessage);
                }
            } else if (email) {
                showMessage('Please enter a valid email address.');
            }
        };
        
        // Check if user is already logged in
        const savedUser = localStorage.getItem('user');
        if (savedUser && window.location.pathname.includes('index.html')) {
            const user = JSON.parse(savedUser);
            if (user.uid) {
                // Auto redirect if already logged in
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
